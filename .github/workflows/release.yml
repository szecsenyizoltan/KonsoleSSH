name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.7)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/konsolessh.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/konsolessh.jks" >> "$GITHUB_ENV"

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=${KEYSTORE_PATH}"
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
          } > keystore.properties

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Read version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        id: apk
        run: |
          SRC=app/build/outputs/apk/release/app-release.apk
          DST="KonsoleSSH-${{ steps.version.outputs.name }}-release.apk"
          cp "$SRC" "$DST"
          echo "path=${DST}" >> "$GITHUB_OUTPUT"

      - name: Compute signer SHA-256 fingerprint
        id: fingerprint
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          FP=$("$APKSIGNER" verify --print-certs "${{ steps.apk.outputs.path }}" \
               | grep -i "SHA-256 digest:" | head -1 \
               | sed -E 's/.*: *//' \
               | tr '[:lower:]' '[:upper:]' \
               | sed -E 's/(..)/\1:/g; s/:$//')
          echo "sha256=${FP}" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          {
            echo "## Telepítés"
            echo ""
            echo "Töltsd le a \`${{ steps.apk.outputs.path }}\` fájlt és telepítsd (ismeretlen forrás engedélyezése szükséges, ha Play-en kívülről rakod fel)."
            echo ""
            echo "Az APK ugyanazzal a kulccsal van aláírva, mint a Play Store-os verzió — így a frissítés probléma nélkül felülírja a Play-esét, és fordítva is."
            echo ""
            echo "SHA-256 fingerprint: \`${{ steps.fingerprint.outputs.sha256 }}\`"
          } > release-notes.md
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 && {
            gh release upload "$TAG" "${{ steps.apk.outputs.path }}" --clobber
          } || {
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "${{ steps.notes.outputs.path }}" \
              --generate-notes \
              "${{ steps.apk.outputs.path }}"
          }

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f keystore.properties "${KEYSTORE_PATH}"
