name: Release APK + Play upload

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.7)'
        required: true
      play_track:
        description: 'Play Store track(s) — comma-separated'
        required: true
        default: 'internal,alpha'
        type: choice
        options:
          - internal,alpha
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/konsolessh.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/konsolessh.jks" >> "$GITHUB_ENV"

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=${KEYSTORE_PATH}"
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
          } > keystore.properties

      - name: Build signed APK + AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Read version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        id: artifacts
        run: |
          APK_SRC=app/build/outputs/apk/release/app-release.apk
          AAB_SRC=app/build/outputs/bundle/release/app-release.aab
          APK_DST="KonsoleSSH-${{ steps.version.outputs.name }}-release.apk"
          AAB_DST="KonsoleSSH-${{ steps.version.outputs.name }}-release.aab"
          cp "$APK_SRC" "$APK_DST"
          cp "$AAB_SRC" "$AAB_DST"
          echo "apk=${APK_DST}" >> "$GITHUB_OUTPUT"
          echo "aab=${AAB_DST}" >> "$GITHUB_OUTPUT"

      - name: Compute signer SHA-256 fingerprint
        id: fingerprint
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          FP=$("$APKSIGNER" verify --print-certs "${{ steps.artifacts.outputs.apk }}" \
               | grep -i "SHA-256 digest:" | head -1 \
               | sed -E 's/.*: *//' \
               | tr '[:lower:]' '[:upper:]' \
               | sed -E 's/(..)/\1:/g; s/:$//')
          echo "sha256=${FP}" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        id: notes
        run: |
          {
            echo "## Telepítés"
            echo ""
            echo "Töltsd le a \`${{ steps.artifacts.outputs.apk }}\` fájlt és telepítsd (ismeretlen forrás engedélyezése szükséges, ha Play-en kívülről rakod fel)."
            echo ""
            echo "Az APK ugyanazzal a kulccsal van aláírva, mint a Play Store-os verzió — így a frissítés probléma nélkül felülírja a Play-esét, és fordítva is."
            echo ""
            echo "SHA-256 fingerprint: \`${{ steps.fingerprint.outputs.sha256 }}\`"
          } > release-notes.md
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 && {
            gh release upload "$TAG" "${{ steps.artifacts.outputs.apk }}" --clobber
          } || {
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "${{ steps.notes.outputs.path }}" \
              --generate-notes \
              "${{ steps.artifacts.outputs.apk }}"
          }

      - name: Check Play secret
        id: play_secret
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_JSON" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set — skipping Play Store upload."
          fi

      - name: Upload AAB to Google Play
        if: steps.play_secret.outputs.present == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: hu.billman.konsolessh
          releaseFiles: ${{ steps.artifacts.outputs.aab }}
          tracks: ${{ github.event.inputs.play_track || 'internal,alpha' }}
          status: completed
          mappingFile: app/build/outputs/mapping/release/mapping.txt

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f keystore.properties "${KEYSTORE_PATH}"
