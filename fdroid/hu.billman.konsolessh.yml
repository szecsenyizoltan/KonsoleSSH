AutoName: KonsoleSSH
Summary: Multi-tab SSH terminal inspired by KDE Konsole

Description: |-
    Multi-tab SSH terminal for Android with a Canvas-based emulator,
    jump-host support, SFTP file upload, and encrypted storage for
    saved connection profiles.

    Features:

    * Multi-tab UI with independent SSH sessions per tab (ViewPager2).
    * SSH authentication with password or PEM private key (optional
      passphrase), keyboard-interactive auth supported.
    * Jump host (``ssh -J``) with local port forwarding for reaching
      hosts on internal networks.
    * Canvas-based terminal emulator: 256-colour + truecolor, bold,
      underline, reverse video, scrollback, ANSI/VT100 +
      xterm-256color PTY, alt-screen buffer for vi/top/less/mc.
    * Bundled NerdFont (JetBrainsMono) with proper emoji / surrogate
      pair rendering.
    * On-screen key bar with Fn row, Ctrl combos, sticky modifiers,
      arrow row, SFTP upload.
    * Foreground Service keeps SSH sessions alive through screen
      lock and task removal; per-session output buffer replayed on
      reconnect.
    * Interactive password prompts when no password is saved.
    * Saved connections stored in EncryptedSharedPreferences
      (AES256, Android Keystore).
    * Tree-grouped connection picker based on common underscore
      prefixes.
    * Linux command and tmux cheat sheets (swipe from welcome page),
      localised to Hungarian when the system language is Hungarian.
    * Friendly error messages instead of raw JSch exceptions.
    * Edge-to-edge layout with proper window-insets handling on
      Android 15.

    No data is collected, shared or uploaded. Credentials stay on
    the device in the encrypted keystore-backed store.

